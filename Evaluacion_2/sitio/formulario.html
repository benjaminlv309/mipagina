<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main class="container">
        <div class="form-wrapper">
            <h2>Registro de Usuario</h2>
            <p>Completa tus datos para crear una cuenta.</p>
            <hr>
            <form onsubmit="return validar()">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="username" class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="username">
                        <div id="username-msg" class="form-text text-danger"></div>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label for="password" class="form-label">Clave</label>
                        <input type="password" class="form-control" id="password">
                        <div id="password-msg" class="form-text text-danger"></div>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label for="re-password" class="form-label">Reingreso de clave</label>
                        <input type="password" class="form-control" id="re-password">
                        <div id="re-password-msg" class="form-text text-danger"></div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-8 mb-3">
                        <label for="address" class="form-label">Dirección postal</label>
                        <input type="text" class="form-control" id="address">
                        <div id="address-msg" class="form-text text-danger"></div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="comuna" class="form-label">Comuna</label>
                        <select class="form-select" id="comuna">
                            <option value="">Seleccione una comuna...</option>
                            <option value="Santiago">Santiago</option>
                            <option value="Valparaíso">Valparaíso</option>
                            <option value="Concepción">Concepción</option>
                            <option value="La Serena">La Serena</option>
                            <option value="Antofagasta">Antofagasta</option>
                        </select>
                        <div id="comuna-msg" class="form-text text-danger"></div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="phone" class="form-label">Número de teléfono</label>
                        <input type="text" class="form-control" id="phone">
                        <div id="phone-msg" class="form-text text-danger"></div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="website" class="form-label">Página web personal</label>
                        <input type="text" class="form-control" id="website">
                        <div id="website-msg" class="form-text text-danger"></div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="hobby" class="form-label">Aficiones</label>
                        <div class="input-group">
                            <input type="text" class="form-control" id="hobby">
                            <button onclick="agregarHobby()" class="btn btn-secondary" type="button">Agregar</button>
                        </div>
                        <div id="hobby-msg" class="form-text text-danger"></div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="hobby-list" class="form-label">Aficiones agregadas</label>
                        <ul id="hobby-list" class="list-group"></ul>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary my-3">Registrarse</button>
                <button type="reset" class="btn btn-secondary my-3">Limpiar</button>
                <div id="mensaje-exito" class="success-message" style="display:none;"></div>
            </form>
        </div>
    </main>
    <script src="js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
