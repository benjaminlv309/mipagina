<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="css/contacto.css">
</head>

<body>
    <header>
        <h1>El Leopardo</h1>
    </header>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="detalles.html">Detalles</a>
        <a href="galeria.html">Galería</a>
        <a href="contacto.html">Contacto</a>
    </nav>

    <main>
        <h2>Contáctanos</h2>
        <p>Rellena este formulario y nos pondremos en contacto contigo pronto.</p>

        <form class="formulario-contacto">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre...">

            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" name="apellido" required placeholder="Tu apellido...">

            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com">

            <label for="fecha">Fecha de Nacimiento</label>
            <input type="date" id="fecha" name="fecha" required>

            <label for="nacionalidad">Nacionalidad</label>
            <select id="nacionalidad" name="nacionalidad">
                <option value="chile">Chile</option>
                <option value="argentina">Argentina</option>
                <option value="mexico">México</option>
                <option value="peru">Perú</option>
                <option value="colombia">Colombia</option>
                <option value="otro">Otro</option>
            </select>

            <label for="detalles">Detalles Adicionales</label>
            <textarea id="detalles" name="detalles" rows="4"
                placeholder="Escribe aquí lo que quieras comunicarnos..."></textarea>

            <button type="button">Enviar Formulario</button>
        </form>
    </main>

    <footer>
        <p>Mi Sitio &copy; 2026</p>
    </footer>
</body>

</html>
